#cloud-config
package_update: true
packages:
  - qemu-guest-agent
  - curl
  - ubuntu-drivers-common
  - ca-certificates
  - gnupg2
runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  # Install Nvidia GPU driver
  - DEBIAN_FRONTEND=noninteractive ubuntu-drivers install --gpgpu
  # Install Nvidia Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html)
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-container-toolkit
  # Install K3s agent (auto-detects nvidia container runtime)
  - curl -sfL https://get.k3s.io | K3S_URL=https://${CONTROL_PLANE_HOST}:6443 K3S_TOKEN=${K3S_TOKEN} sh -s - --node-label nvidia.com/gpu=true
  # Reboot into the new kernel so nvidia module is available
  - reboot
